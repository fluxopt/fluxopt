version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
    groups:
      linting:
        patterns:
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "pandas-stubs"
      testing:
        patterns:
          - "pytest*"
      documentation:
        patterns:
          - "mkdocs*"
          - "mike"
          - "pymdown-extensions"
          - "pygments"
          - "markdown-include"
          - "notebook"

  # Bench-scoped lock (benchmark/uv.lock) — the one pinned env in the repo.
  - package-ecosystem: "uv"
    directory: "/benchmark"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
