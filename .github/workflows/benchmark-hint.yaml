name: Benchmark hint

# A small performance hint on every PR: run the realistic reference-system
# suite (benchmark/test_reference.py) under pytest-benchmem and put its
# numbers in the job summary. Informational only — deltas and dashboards are
# CodSpeed's job; local ref-vs-ref comparison is `benchmem sweep`
# (see benchmark/README.md).

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hint:
    name: Benchmark hint
    runs-on: ubuntu-latest
    continue-on-error: true # informational, never blocks a merge
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # hatch-vcs
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run reference benchmarks (pytest-benchmem)
        working-directory: benchmark
        run: |
          uv sync --frozen
          uv run --no-sync pytest test_reference.py --benchmark-only --benchmark-memory \
            --benchmark-json "$RUNNER_TEMP/run.json"
      - name: Report the numbers
        working-directory: benchmark
        run: |
          uv run --no-sync benchmem compare "$RUNNER_TEMP/run.json" \
            --format md --columns time,peak --stat mean --group-by func >> "$GITHUB_STEP_SUMMARY"
