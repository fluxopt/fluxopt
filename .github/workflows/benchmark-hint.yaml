name: Benchmark hint

# A small, human-readable performance hint on every PR: run the user-facing
# benchmark (`python -m fluxopt.benchmark`) on the PR head and on the base
# branch, and keep one sticky comment with the delta table. Informational only
# — regression tracking with pinned envs is the CodSpeed workflow's job.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hint:
    name: Benchmark hint
    # Commenting needs a writable token; fork PRs only get a read-only one.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    continue-on-error: true # informational, never blocks a merge
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # hatch-vcs + checkout of the base revision
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Keep the comment renderer across checkouts
        run: cp scripts/benchmark_comment.py "$RUNNER_TEMP/"
      - name: Benchmark PR head
        run: uv run python -m fluxopt.benchmark --json > "$RUNNER_TEMP/head.json"
      - name: Benchmark base (${{ github.event.pull_request.base.ref }})
        run: |
          git checkout --detach ${{ github.event.pull_request.base.sha }}
          if [ -f src/fluxopt/benchmark.py ]; then
            uv run python -m fluxopt.benchmark --json > "$RUNNER_TEMP/base.json"
          fi
      - name: Render comment
        run: >
          python3 "$RUNNER_TEMP/benchmark_comment.py"
          "$RUNNER_TEMP/head.json" "$RUNNER_TEMP/base.json"
          --repo "${{ github.repository }}"
          --base "${{ github.event.pull_request.base.ref }}"
          --head "${{ github.event.pull_request.head.ref }}"
          > "$RUNNER_TEMP/comment.md"
      - name: Post or update the sticky comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          marker='<!-- benchmark-hint -->'
          existing=$(gh api --paginate "repos/${{ github.repository }}/issues/$PR/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$existing" \
              -F body=@"$RUNNER_TEMP/comment.md" > /dev/null
          else
            gh pr comment "$PR" --body-file "$RUNNER_TEMP/comment.md"
          fi
