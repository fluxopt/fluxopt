site_name: fluxopt
site_description: Energy system optimization with linopy
repo_url: https://github.com/FBumann/fluxopt
repo_name: FBumann/fluxopt
edit_uri: edit/main/docs/

nav:
  - Home: index.md
  - Tutorials:
    - 1. Quickstart: notebooks/01-quickstart.ipynb
    - 2. Storage: notebooks/02-storage.ipynb
    - 3. Status: notebooks/03-status.ipynb
    - 4. Piecewise: notebooks/04-piecewise.ipynb
    - 5. Sizing: notebooks/05-sizing.ipynb
    - 6. Multi-Period & Investment: notebooks/06-multi-period.ipynb
  - Examples:
    - Heat System with Storage: notebooks/examples/heat-system.ipynb
    - Multi-Node Heat: notebooks/examples/multi-node-heat.ipynb
    - Investment: notebooks/examples/investment.ipynb
  - Math:
    - Notation: math/notation.md
    - Objective: math/objective.md
    - Carrier Balance: math/carrier-balance.md
    - Flows: math/flows.md
    - Converters: math/converters.md
    - Storage: math/storage.md
    - Effects: math/effects.md
    - Sizing: math/sizing.md
    - Status: math/status.md
  - API Reference: api/
  - Contributing: contributing.md
  - Changelog: changelog.md

theme:
  name: material
  language: en

  # logo: assets/logo.svg       # placeholder — text-only header for now
  # favicon: assets/favicon.png

  palette:
    # Dark first = default for new visitors (no auto/system-pref entry).
    # Icon represents the CURRENT scheme — moon when active is dark,
    # sun when active is light. The `name` describes the toggle action.
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font:
    text: Roboto
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

  features:
    - header.autohide
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - include-markdown

  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py

  - literate-nav:
      nav_file: SUMMARY.md

  - mkdocs-jupyter:
      include_source: true
      execute: true
      remove_tag_config:
        remove_input_tags: ["hide-input"]
        remove_all_outputs_tags: ["hide-output"]
        remove_cell_tags: ["hide-cell"]

  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.xarray.dev/en/stable/objects.inv
            - https://pandas.pydata.org/docs/objects.inv
            - https://linopy.readthedocs.io/en/latest/objects.inv
          options:
            docstring_style: google
            docstring_section_style: table
            members_order: source
            show_if_no_docstring: false
            heading_level: 1
            show_root_heading: true
            show_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            line_length: 80
            modernize_annotations: true
            merge_init_into_class: true
            summary: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: true
            parameter_headings: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/notebook-prompts.js
  - javascripts/notebook-download.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - src/fluxopt
  - docs
