site_name: fluxopt
site_description: Energy system optimization with linopy
repo_url: https://github.com/FBumann/fluxopt
repo_name: FBumann/fluxopt

nav:
  - Home: index.md
  - Notebooks:
    - Quickstart: notebooks/01-quickstart.ipynb
    - Heat System: notebooks/02-heat-system.ipynb
    - Multi-Node Heat: notebooks/03-multi-node-heat.ipynb
    - Multi-Period: notebooks/04-multi-period.ipynb
    - Investment: notebooks/05-investment.ipynb
  - Math:
    - Notation: math/notation.md
    - Objective: math/objective.md
    - Carrier Balance: math/carrier-balance.md
    - Flows: math/flows.md
    - Converters: math/converters.md
    - Storage: math/storage.md
    - Effects: math/effects.md
    - Sizing: math/sizing.md
    - Status: math/status.md
  - API Reference: api/
  - Changelog: changelog.md

theme:
  name: material
  language: en

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  font:
    text: Roboto
    code: Fira Code

  icon:
    repo: fontawesome/brands/github

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - include-markdown

  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py

  - literate-nav:
      nav_file: SUMMARY.md

  - redirects:
      redirect_maps:
        guide/getting-started.md: index.md
        guide/flows.md: math/flows.md
        guide/converters.md: math/converters.md
        guide/storage.md: math/storage.md
        guide/effects.md: math/effects.md
        guide/sizing.md: math/sizing.md
        guide/status.md: math/status.md

  - mkdocs-jupyter:
      include_source: true
      execute: true

  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            members_order: source
            show_if_no_docstring: false
            heading_level: 1
            show_root_heading: true
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 80
            modernize_annotations: true
            merge_init_into_class: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - src/fluxopt
  - docs
